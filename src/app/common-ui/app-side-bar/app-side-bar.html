<img
src="/assets/svg/small-logo.svg"
alt=""
class="ml16 mb20"
>

<nav class="mb20">
  <ul class="main-menu-list">
    <li>
      @for (menuItem of menuItems; track $index) {
        <a class="menu-item"
        [routerLink]="menuItem.link"
        routerLinkActive="active">
          <svg [icon]="menuItem.icon"></svg>
          <span>{{ menuItem.label }}</span>
        </a>
      }
    </li>
  </ul>
</nav>

<p class="medium-text mb20">Подписчики</p>
@for (profile of subscribers$ | async; track profile.id) {
  <a class="subscribers" [routerLink]="['/profile', profile.id]">
    <app-subscriber-card
    [profile]="profile"
    ></app-subscriber-card>
  </a>

}

    >Все подписчики
  </a>
  <svg icon="arrow" class="to-subscribers-icon to-subscribers"></svg>
</div>-->

<footer class="sidebar__footer">
  @if (me(); as me) {
    @if (me.avatarUrl) {
      <img [src]="me.avatarUrl | imgUrl" alt="">
    } @else {
      <img src="/assets/images/avatar-placeholder.png" alt="">
    }
    <div class="medium-text username-text">{{ me.username }}</div>

    <div class="settings-wrapper">
      <button class="settings-btn" (click)="toggleMenu($event)">
        <svg icon="settings"></svg>
      </button>
      @if (showMenu()) {
        <div class="dropdown-menu" (click)="$event.stopPropagation()">
          <button class="settings-wrapper-btns" (click)="goToSettings()">Настройки</button>
          <button class="settings-wrapper-btns" (click)="logout()">Выход</button>
        </div>
      }
    </div>
  }
</footer>
