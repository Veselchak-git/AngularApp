@if (profile)
{
  <div class="profile-card">
    <div class="avatar-name">
      @if (profile.avatarUrl == null) {
        <img
          src="/assets/images/avatar-placeholder.png"
          alt=""
          class="profile-card__avatar">
      }
      @else {
        <img
            [src]="profile.avatarUrl | imgUrl "
            [alt]="profile.lastName"
            class="profile-card__avatar">

      }

      <div class="profile-card__name">
        <strong class="h6">{{profile.firstName}} {{profile.lastName}}</strong>
        <span class="subtitle">{{profile.username}}</span>
      </div>
    </div>
    <div class="profile-card__description">{{profile.description}}</div>

    <div class="profile-card__tags">
      @for (skill of profile.stack; track skill)
      {
        <div class="skill-tag">{{skill}}</div>
      }
    </div>
    <div class="profile-card_action-btns">
        <button type="button" class="btn subscribe-btn">
          Подписаться
          <svg icon="subscribe" class="subscribe-icon"></svg>
        </button>

          <a  class="btn visit-btn" (click)="goToProfile(profile.id)">
            <svg icon="visit" class="visit-icon"></svg>
          </a>

      </div>

  </div>
}
