@for (post of posts$ | async; track post.id) {
  <div class="post-wrapper">
    <header class="post-header">
      <img class="post__avatar" [src]="post.author.avatarUrl | imgUrl" alt="">
      <span class="post-author">{{ post.author.firstName }} {{ post.author.lastName }}</span>
      <span class="post-date medium-text"> {{ post.createdAt | date }}</span>
      <div class="post-menu-wrapper">
        <button class="show-menu-btn menu-btn" (click)="togglePostMenu($event, post.id)">
          <svg icon="post-menu"></svg>
        </button>
        @if (isPostMenuOpen(post.id)) {
          <div class="dropdown-menu" (click)="$event.stopPropagation()">
            <button class="post-menu-btns">Редактировать</button>
            <button class="post-menu-btns" (click)="deletePost(post.id)">Удалить</button>
          </div>
        }
      </div>
    </header>
    <p class="post-content regular">{{ post.content }}</p>
    <div class="actions-wrapper">
      <div class="comments-wrapper">
        <button class="show-comments-btn show-menu-btn " (click)="toggleCommentsMenu($event, post.id)">
          <svg icon="comment"></svg>
        </button>

      </div>
        <button class="like-btn show-menu-btn" (click)="toggleLike(post)">
          <svg icon="like"></svg>
          <p>{{post.likes}}</p>
        </button>
    </div>
    @if (isCommentsMenuOpen(post.id)) {
              <p>{{post.content}}</p>                       <!--!!!!!!!!!!!!!!!ДОЛЖЕН БЫТЬ post.comments!!!!!!!!!!!!!!!!!!!!!!!-->
            }
  </div>
}
